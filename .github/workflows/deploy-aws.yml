name: Deploy to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - 'cloud_system/**'
  workflow_dispatch:

env:
  REGION: us-east-1
  INSTANCE_NAME: dyslexia-detection-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Get EC2 instance IP
        id: ec2
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.INSTANCE_NAME }}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Create deployment archive
        run: |
          tar czf deploy.tar.gz \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.git' \
            --exclude='ds003126_raw' \
            --exclude='ds006239_raw' \
            cloud_system/

      - name: Upload and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ec2.outputs.ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd ~
            # Clean old deployment
            rm -rf cloud_system/ dyslexia-deploy.tar.gz

      - name: Copy archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.ec2.outputs.ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: deploy.tar.gz
          target: ~/

      - name: Start containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ec2.outputs.ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd ~
            tar xzf deploy.tar.gz
            cd cloud_system/docker
            sudo docker compose pull
            sudo docker compose up --build -d
            sudo docker compose ps
            echo "Deployed at $(date)"
